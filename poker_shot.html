  // ── IIFE 返り値 ───────────────────────────────────────────────

  return {
    onEnter() {
      _human.name = _playerNickname || 'プレイヤー';
      _tableGrad = ctx.createRadialGradient(TBL_CX - 60, TBL_CY - 40, 20, TBL_CX, TBL_CY, TBL_RX);
      _tableGrad.addColorStop(0, '#2e6e2e'); _tableGrad.addColorStop(1, '#193619');
      _isPaused = false; _showConfirm = false;
      _startRound();
    },

    dbgDealJoker() {
      if (_human.isAlive && _state.playerCard !== undefined) {
        _state.playerCard = { value: 99, suit: 'j' };
        console.log('[DBG] Joker dealt to player');
      }
    },

    update(dt) {
      if (isHowToPlayOpen) return;  // BUILD 0018: モーダル中はゲーム操作を無効化

      // ── BUILD 0011: ボタン・ポーズ・確認ダイアログ処理 ──────────
      if (Input.isPressed('Escape')) {
        if (_showConfirm) { _showConfirm = false; _isPaused = true; }
        else              { _isPaused = !_isPaused; }
      }

      if (Input.mouse.clicked) {
        if (_showConfirm) {
          // 確認ダイアログ中のクリック
          if (Input.mouse.x >= CONFIRM_YES_X && Input.mouse.x <= CONFIRM_YES_X + CONFIRM_YES_W &&
              Input.mouse.y >= CONFIRM_BTN_Y  && Input.mouse.y <= CONFIRM_BTN_Y + CONFIRM_YES_H) {
            // はい → やり直し
            _showConfirm = false; _isPaused = false;
            _startRound();
            return;
          }
          if (Input.mouse.x >= CONFIRM_NO_X && Input.mouse.x <= CONFIRM_NO_X + CONFIRM_NO_W &&
              Input.mouse.y >= CONFIRM_BTN_Y && Input.mouse.y <= CONFIRM_BTN_Y + CONFIRM_NO_H) {
            // キャンセル
            _showConfirm = false; _isPaused = true;
          }
          return; // ダイアログ中は他の入力を無視
        }
        // 一時停止ボタン
        if (Input.mouse.x >= BTN_PAUSE_X   && Input.mouse.x <= BTN_PAUSE_X   + BTN_W &&
            Input.mouse.y >= BTN_Y          && Input.mouse.y <= BTN_Y          + BTN_H) {
          _isPaused = !_isPaused;
        }
        // タイトルへボタン（ポーズ中のみ有効・BUILD 0017: 確認なし即タイトル遷移）
        if (_isPaused &&
            Input.mouse.x >= BTN_RESTART_X && Input.mouse.x <= BTN_RESTART_X + BTN_W &&
            Input.mouse.y >= BTN_Y         && Input.mouse.y <= BTN_Y         + BTN_H) {
          _isPaused = false;
          SceneManager.change('Title');
        }
        // BUILD 0013: つぎへスキップボタン（リザルト演出中のみ・非ポーズ時）
        if (!_isPaused && _isSkipPhase() &&
            Input.mouse.x >= SKIP_BX && Input.mouse.x <= SKIP_BX + SKIP_BW &&
            Input.mouse.y >= SKIP_BY && Input.mouse.y <= SKIP_BY + SKIP_BH) {
          _skipPhase();
        }
      }

      // ポーズ中は以降の処理をスキップ
      if (_isPaused) return;

      // リアクションログ年齢更新（全フェーズ共通）
      for (let j = 0; j < _reactionLog.length; j++) _reactionLog[j].age += dt;

      // BUILD 0015: セリフタイマー減算（全フェーズ共通）
      for (let i = 0; i < AI_COUNT; i++) {
        if (_state.aiSpeech1T[i] > 0) _state.aiSpeech1T[i] = Math.max(0, _state.aiSpeech1T[i] - dt);
        if (_state.aiSpeech2T[i] > 0) _state.aiSpeech2T[i] = Math.max(0, _state.aiSpeech2T[i] - dt);
      }
      // BUILD 0017: 吹き出しローテーションタイマー
      _state.speechRotationTimer += dt;
      if (_state.speechRotationTimer >= SPEECH_ROTATION_INTERVAL) {
        _state.speechRotationTimer = 0;
        _rotateSpeech();
      }

      // ── deal フェーズ ─────────────────────────────────────────
      if (_state.phase === 'deal') {
        _state.phase      = 'exchange';
        _state.roundTimer = EXCHANGE_TIMER;
        return;
      }

      // ── exchange フェーズ ─────────────────────────────────────
      if (_state.phase === 'exchange') {
        _state.roundTimer -= dt;
        _state.reactionLogIntervalT -= dt;
        if (_state.reactionLogIntervalT <= 0) {
          _state.reactionLogIntervalT = REACTION_INTERVAL;
          _genAllReactions('interval');
        }

        if (_state.playerSwapped === null) {
          if (Input.mouse.clicked) {
            if (_inRect(_actBtns[0].x, ACT_BY,       ACT_BW,       ACT_BH))       _state.playerSwappedProv = true;
            if (_inRect(_actBtns[1].x, ACT_BY,       ACT_BW,       ACT_BH))       _state.playerSwappedProv = false;
            if (_state.playerSwappedProv !== null &&
                _inRect(_actBtns[2].x, BET_DECIDE_BY, BET_DECIDE_BW, BET_DECIDE_BH)) {
              _state.playerSwapped = _state.playerSwappedProv;
              _genSpeech2();
            }
          }
        }
        if (_state.roundTimer <= 0) {
          if (_state.playerSwapped === null) {
            _state.playerSwapped = (_state.playerSwappedProv !== null) ? _state.playerSwappedProv : false;
            _genSpeech2();
          }
          _executeAISwaps(); _startBetPhase(); return;
        }
        if (_state.playerSwapped !== null && Input.mouse.clicked) {
          if (_inRect(_actBtns[2].x, BET_DECIDE_BY, BET_DECIDE_BW, BET_DECIDE_BH)) {
            _executeAISwaps(); _startBetPhase(); return;
          }
        }
        return;
      }

      // ── bet フェーズ ──────────────────────────────────────────
      if (_state.phase === 'bet') {
        _state.roundTimer  -= dt;
        _state.betElapsedT += dt;
        // リアクションインターバル
        _state.reactionLogIntervalT -= dt;
        if (_state.reactionLogIntervalT <= 0) {
          _state.reactionLogIntervalT = REACTION_INTERVAL;
          _genAllReactions('interval');
        }

        if (_state.playerBet === null) {
          if (Input.mouse.clicked) {
            // BET/FOLD クリック → 仮選択
            if (_inRect(BET_BX,  BET_BY_C, BET_BW, BET_BH))  _state.playerBetProv = true;
            if (_inRect(FOLD_BX, BET_BY_C, BET_BW, BET_BH))  _state.playerBetProv = false;
            // 決定ボタン（仮選択中のみ有効）
            if (_state.playerBetProv !== null &&
                _inRect(BET_DECIDE_BX + 160, BET_DECIDE_BY, BET_DECIDE_BW, BET_DECIDE_BH)) {
              _state.playerBet = _state.playerBetProv;
              _state.betDecisionShown = true;  // プレイヤー決定時に即時表示
            }
          }
          if (_state.roundTimer <= 0) {
            // 時間切れ: 仮選択があればそれを採用、なければフォールド
            _state.playerBet = _state.playerBetProv !== null ? _state.playerBetProv : false;
            _state.betDecisionShown = true;
          }
        }

        if (_state.playerBet !== null) {
          _preBetCalc();           // shotCount 先計算（hype表示用）ダメージはまだ与えない
          _genAllReactions('bet_done');
          // hype 感嘆符を設定
          const EXCLAIMS = ['！', '…', 'ッ'];
          for (let i = 0; i < AI_COUNT; i++) {
            _state.hypeExclaim[i] = _ai[i].isAlive
              ? EXCLAIMS[Math.floor(Math.random() * EXCLAIMS.length)] : '';
          }
          _state.phase         = 'show_decisions';
          _state.subPhaseTimer = SHOW_DECISIONS_TIME;
        }
        return;
      }

      // ── show_decisions フェーズ（1.5秒）─────────────────────────
      if (_state.phase === 'show_decisions') {
        _state.subPhaseTimer -= dt;
        if (_state.subPhaseTimer <= 0) {
          _state.phase     = 'hype';
          _state.hypeTimer = 0;
          _state.hypeFlashAlpha = 0;
        }
        return;
      }

      // ── hype フェーズ（HYPE_DURATION秒）─────────────────────────
      if (_state.phase === 'hype') {
        _state.hypeTimer += dt;
        // フラッシュ更新
        if (_state.hypeTimer >= HYPE_FLASH_AT) {
          const fT = _state.hypeTimer - HYPE_FLASH_AT;
          _state.hypeFlashAlpha = fT < HYPE_FLASH_DUR
            ? Math.max(0, 1 - fT / HYPE_FLASH_DUR) : 0;
        }
        if (_state.hypeTimer >= HYPE_DURATION) {
          if (_state.playerBet === true) {
            _state.phase       = 'card_reveal';  // ベット: カード開示へ
            _state.revealTimer = 0;
          } else {
            _state.phase          = 'highlight_cards';  // フォールド: card_revealスキップ
            _state.highlightTimer = 0;
          }
        }
        return;
      }

      // ── card_reveal フェーズ（2秒）───────────────────────────────
      if (_state.phase === 'card_reveal') {
        _state.revealTimer += dt;
        if (_state.revealTimer >= SHOT_FLASH_DURATION + REVEAL_SHOW_TIME) {
          // BUILD 0012: show_result の前に highlight_cards フェーズへ
          _state.phase          = 'highlight_cards';
          _state.highlightTimer = 0;
        }
        return;
      }

      // ── highlight_cards フェーズ（HIGHLIGHT_CARDS_TIME秒）────────
      if (_state.phase === 'highlight_cards') {
        _state.highlightTimer += dt;
        if (_state.highlightTimer >= HIGHLIGHT_CARDS_TIME) {
          // imageState スナップショット → resolve → フリップ対象検出
          for (let i = 0; i < AI_COUNT; i++) _prevAiImageStates[i] = _ai[i].imageState;
          _findBetLosers();
          _resolveRound();
          _state.flipTargets.length = 0;
          for (let i = 0; i < AI_COUNT; i++) {
            // _applyDamage は imageState を変えないので HP から算出
            _newAiImageStates[i] = _calcNewImageState(_ai[i].hp, _prevAiImageStates[i]);
            if (_ai[i].isAlive && _ai[i].hp > 0 && _newAiImageStates[i] !== _prevAiImageStates[i]) {
              _state.flipTargets.push(i);
            }
          }
          // imageState / dispHp は judge 終了後に更新するためここでは変更しない
          _state.phase      = 'judge';
          _state.judgeTimer = 0;
        }
        return;
      }

      // ── judge フェーズ（JUDGE_TIME秒）────────────────────────────
      if (_state.phase === 'judge') {
        _state.judgeTimer += dt;
        if (_state.judgeTimer >= JUDGE_TIME) {
          // dispHp・imageState を新HPに同期
          _human.dispHp = _human.hp;
          for (let i = 0; i < AI_COUNT; i++) _ai[i].dispHp = _ai[i].hp;
          if (_state.flipTargets.length > 0) {
            _state.phase          = 'flip_drunk';
            _state.flipTimer      = 0;
            _state.flipMidApplied = false;
          } else {
            for (let i = 0; i < AI_COUNT; i++) _ai[i].imageState = _newAiImageStates[i];
            _detectEliminations();
            if (_state.bonusQueue.length > 0) {
              _state.phase             = 'bonus_display';
              _state.bonusDisplayTimer = BONUS_TEXT_DURATION + BONUS_IMG_DURATION;
            } else if (_state.elimNames.length > 0) {
              _state.phase         = 'show_result';
              _state.subPhaseTimer = RESULT_DISPLAY_TIME;
              _state.resolveFlashT = 0; _state.resolveFlashOn = true;
              _state.elimTimer     = ELIMINATION_PAUSE;
            } else {
              _state.phase         = 'show_result';
              _state.subPhaseTimer = RESULT_DISPLAY_TIME;
              _state.resolveFlashT = 0; _state.resolveFlashOn = true;
            }
          }
        }
        return;
      }

      // ── flip_drunk フェーズ（NPC_FLIP_HALF_DUR×2 秒）────────────
      if (_state.phase === 'flip_drunk') {
        _state.flipTimer += dt;
        // 中間点で新 imageState を適用（「パタン」の裏返り瞬間）
        if (!_state.flipMidApplied && _state.flipTimer >= NPC_FLIP_HALF_DUR) {
          _state.flipMidApplied = true;
          for (let k = 0; k < _state.flipTargets.length; k++) {
            _ai[_state.flipTargets[k]].imageState = _newAiImageStates[_state.flipTargets[k]];
          }
        }
        if (_state.flipTimer >= NPC_FLIP_HALF_DUR * 2) {
          _detectEliminations();
          if (_state.bonusQueue.length > 0) {
            _state.phase             = 'bonus_display';
            _state.bonusDisplayTimer = BONUS_TEXT_DURATION + BONUS_IMG_DURATION;
          } else if (_state.elimNames.length > 0) {
            _state.phase         = 'show_result';
            _state.subPhaseTimer = RESULT_DISPLAY_TIME;
            _state.resolveFlashT = 0; _state.resolveFlashOn = true;
            _state.elimTimer     = ELIMINATION_PAUSE;
          } else {
            _state.phase         = 'show_result';
            _state.subPhaseTimer = RESULT_DISPLAY_TIME;
            _state.resolveFlashT = 0; _state.resolveFlashOn = true;
          }
        }
        return;
      }


      // ── show_result フェーズ（RESULT_DISPLAY_TIME秒）───────────────
      if (_state.phase === 'show_result') {
        _state.resolveFlashT += dt;
        if (_state.resolveFlashT >= SHOT_FLASH_DURATION) {
          _state.resolveFlashT -= SHOT_FLASH_DURATION;
          _state.resolveFlashOn = !_state.resolveFlashOn;
        }
        if (_state.elimTimer > 0) {
          _state.elimTimer -= dt;
          if (_state.elimTimer <= 0) {
            // 脱落演出終了 → bonus_display or show_result（resolveText表示）
            if (_state.bonusQueue.length > 0) {
              _state.phase             = 'bonus_display';
              _state.bonusDisplayTimer = BONUS_TEXT_DURATION + BONUS_IMG_DURATION;
            } else {
              // elimTimer終了後は同じshow_resultで続行（resolveTextを表示）
              _state.elimTimer     = 0;
              _state.subPhaseTimer = RESULT_DISPLAY_TIME;
            }
          }
          return;
        }
        _state.subPhaseTimer -= dt;
        if (_state.subPhaseTimer <= 0) _advanceAfterShowResult();
        return;
      }

      // ── bonus_display フェーズ（BUILD 0019/0020）─────────────────
      if (_state.phase === 'bonus_display') {
        _state.bonusDisplayTimer -= dt;
        if (_state.bonusDisplayTimer <= 0) {
          _state.bonusQueue.shift();
          if (_state.bonusQueue.length > 0) {
            // 次のエントリを表示
            _state.bonusDisplayTimer = BONUS_TEXT_DURATION + BONUS_IMG_DURATION;
          } else {
            // BUILD 0021: キューが空になったら show_result へ
            _state.phase         = 'show_result';
            _state.subPhaseTimer = RESULT_DISPLAY_TIME;
            _state.resolveFlashT = 0;
            _state.resolveFlashOn = true;
          }
        }
        return;
      }

      // ── fold_card_reveal フェーズ（BUILD 0021）──────────────────
      if (_state.phase === 'fold_card_reveal') {
        _state.revealTimer += dt;
        if (_state.revealTimer >= FOLD_REVEAL_TIME) {
          if (_countAlive() <= 1) {
            _fillFinalHpList();
            ResultScene.setup(_getWinnerName(), _human.isAlive, _finalHpList, AI_COUNT + 1);
            SceneManager.change('Result');
          } else {
            _state.phase = 'next';
          }
        }
        return;
      }

      // ── next フェーズ ─────────────────────────────────────────
      if (_state.phase === 'next') {
        _startNextRound();
        return;
      }
    },

    render() {
      hbClear();
      // BUILD 0013: 背景画像（なければフォールバック）
      if (!_drawBgCover(0.10)) { ctx.fillStyle = '#0b0b18'; ctx.fillRect(0, 0, BASE_W, BASE_H); }

      // AIスロット（5人）
      for (let i = 0; i < AI_COUNT; i++) drawAISlot(i);

      // テーブル
      drawTable();

      // プレイヤーエリア
      drawPlayerArea();

      // 交換フィード
      drawExchangeDecisions();

      // BUILD 0005: リアクションログパネル（常時表示）
      drawReactionLogPanel();

      // BUILD 0014: 全NPC吹き出し（スロット・UI より上、結果演出オーバーレイより下）
      drawAllSpeechBubbles();

      // BUILD 0005: フェーズ別オーバーレイ
      drawShowDecisionsOverlay();
      drawHypeOverlay();
      drawCardRevealOverlay();
      // BUILD 0012: 結果演出新フェーズ
      drawHighlightCardsOverlay();
      drawJudgeOverlay();
      drawShowResultOverlay();

      // BUILD 0013: つぎへスキップボタン
      drawSkipButton();
      // BUILD 0019: ボーナス画像オーバーレイ（最前面）
      drawBonusDisplayOverlay();
      // BUILD 0011: ゲームUIボタン（最前面）
      drawGameUIButtons();
      drawPauseOverlay();
      drawConfirmDialog();

      // ヒットボックス
      hbDraw();
    },

    debugRender,
  };
})();

const ResultScene = (() => {
  const _state    = { outcome: 'GAME OVER', winnerName: '', isPlayerWin: false, survivorCount: 0 };
  const _hpList   = [];
  let   _hpListLen = 0;
  for (let i = 0; i < PLAYER_COUNT; i++) _hpList.push({ name: '', hp: 0, isAlive: false });

  let _blinkT = 0, _blinkV = true, _bgGrad = null;

  return {
    // ゲームロジックから呼ぶ
    setup(winnerName, isPlayerWin, hpList, listLen) {
      _state.winnerName   = winnerName;
      _state.isPlayerWin  = isPlayerWin;
      _state.outcome      = isPlayerWin ? 'YOU WIN!' : 'GAME OVER';
      _hpListLen          = Math.min(listLen, _hpList.length);
      let survivors = 0;
      for (let i = 0; i < _hpListLen; i++) {
        _hpList[i].name    = hpList[i].name;
        _hpList[i].hp      = hpList[i].hp;
        _hpList[i].isAlive = hpList[i].isAlive;
        if (hpList[i].isAlive) survivors++;
      }
      _state.survivorCount = survivors;
    },

    onEnter() {
      _blinkT = 0; _blinkV = true;
      _bgGrad = ctx.createRadialGradient(BASE_W / 2, BASE_H * 0.35, 20, BASE_W / 2, BASE_H / 2, BASE_H);
      _bgGrad.addColorStop(0, '#280000'); _bgGrad.addColorStop(1, '#050005');
      registerButton('r_restart',
        BASE_W / 2 - 120, BASE_H * 0.86, 240, 50,
        'RESTART', () => SceneManager.change('Title'));
    },

    update(dt) {
      _blinkT += dt;
      if (_blinkT >= 0.5) { _blinkT = 0; _blinkV = !_blinkV; }
      if (isHowToPlayOpen) return;  // BUILD 0018: モーダル中はゲーム操作を無効化
      if (Input.isPressed('Space')) SceneManager.change('Title');
      processClicks();
    },

    render() {
      hbClear();
      // BUILD 0013: 背景画像（なければグラデーション）
      if (!_drawBgCover(0.60)) { ctx.fillStyle = _bgGrad; ctx.fillRect(0, 0, BASE_W, BASE_H); }

      // アウトカムテキスト
      ctx.save();
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.shadowColor = _state.outcome === 'YOU WIN!' ? '#0088ff' : '#cc0000';
      ctx.shadowBlur  = 44;
      ctx.fillStyle   = _state.outcome === 'YOU WIN!' ? '#44aaff' : '#ff4444';
      ctx.font        = 'bold 90px serif';
      ctx.fillText(_state.outcome, BASE_W / 2, BASE_H * 0.22);
      ctx.shadowBlur = 0; ctx.restore();

      // 勝者名
      ctx.fillStyle = '#ffee66'; ctx.font = 'bold 32px serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      if (_state.isPlayerWin) {
        ctx.fillText('Winner: ' + _state.winnerName, BASE_W / 2, BASE_H * 0.38);
      } else if (_state.survivorCount === 1) {
        ctx.fillText('Winner: ' + _state.winnerName, BASE_W / 2, BASE_H * 0.38);
      } else {
        ctx.fillStyle = '#cc7755'; ctx.font = 'bold 28px serif';
        ctx.fillText('あなたは脱落しました…', BASE_W / 2, BASE_H * 0.38);
      }

      // 最終HP一覧
      ctx.fillStyle = '#aaaaaa'; ctx.font = 'bold 16px monospace';
      ctx.fillText('─── 最終結果 ───', BASE_W / 2, BASE_H * 0.46);

      const listStartY = BASE_H * 0.51;
      const listSpacY  = 28;
      for (let i = 0; i < _hpListLen; i++) {
        const e = _hpList[i];
        ctx.fillStyle = e.isAlive ? '#88ff88' : '#886666';
        ctx.font      = '18px monospace';
        const drunk   = INITIAL_HP - e.hp;
        const bar     = '■'.repeat(Math.max(0, drunk)) + '□'.repeat(Math.max(0, e.hp));
        ctx.fillText(`${e.name}: 酔い ${drunk}杯  ${bar}`, BASE_W / 2, listStartY + i * listSpacY);
      }

      // 点滅テキスト
      if (_blinkV) {
        ctx.fillStyle = '#cccccc'; ctx.font = 'bold 22px monospace';
        ctx.fillText('PRESS SPACE TO RESTART', BASE_W / 2, BASE_H * 0.84);
      }

      drawButton('r_restart');
      hbAdd(BASE_W / 2 - 120, BASE_H * 0.86, 240, 50, 'RestartBtn');
      hbDraw();
    },
  };
})();

function drawHowToPlayModal() {
  if (!isHowToPlayOpen) return;
  ctx.save();

  // 背景オーバーレイ
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // パネル
  _globalRRect(HTP_X, HTP_Y, HTP_W, HTP_H, 12);
  ctx.fillStyle = 'rgba(20,10,5,0.97)'; ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 2; ctx.stroke();

  // タイトル行
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#d4a843'; ctx.font = 'bold 20px sans-serif';
  ctx.fillText('ポーカー × ショット！— 遊び方', BASE_W / 2, HTP_Y + 14);

  // 区切り線（上）
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(HTP_X + 24, HTP_Y + 50);
  ctx.lineTo(HTP_X + HTP_W - 24, HTP_Y + 50);
  ctx.stroke();

  // ✕ 閉じるボタン
  const hovC = Input.mouse.x >= HTP_CLOSE_X && Input.mouse.x <= HTP_CLOSE_X + HTP_CLOSE_W &&
               Input.mouse.y >= HTP_CLOSE_Y  && Input.mouse.y <= HTP_CLOSE_Y  + HTP_CLOSE_H;
  _globalRRect(HTP_CLOSE_X, HTP_CLOSE_Y, HTP_CLOSE_W, HTP_CLOSE_H, 6);
  ctx.fillStyle = hovC ? 'rgba(255,255,255,0.92)' : 'rgba(80,20,20,0.80)'; ctx.fill();
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1; ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = hovC ? '#000' : '#fff'; ctx.font = 'bold 14px sans-serif';
  ctx.fillText('✕ 閉じる', HTP_CLOSE_X + HTP_CLOSE_W / 2, HTP_CLOSE_Y + HTP_CLOSE_H / 2);

  // 本文テキスト（現在ページ）
  const lines  = HTP_LINES[_htpPage];
  const startX = HTP_X + 28;
  const startY = HTP_Y + 62;
  const lineH  = 16;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  for (let i = 0; i < lines.length; i++) {
    const entry = lines[i];
    ctx.fillStyle = entry.gold ? '#d4a843' : '#f0f0e8';
    ctx.font = entry.gold ? 'bold 13px sans-serif' : '13px sans-serif';
    ctx.fillText(entry.text, startX, startY + i * lineH);
  }

  // 区切り線（下）
  ctx.strokeStyle = '#b8860b'; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(HTP_X + 24, HTP_NAV_Y - 10);
  ctx.lineTo(HTP_X + HTP_W - 24, HTP_NAV_Y - 10);
  ctx.stroke();

  // ◀ 前ページボタン
  const canPrev = _htpPage > 0;
  const hovP = canPrev && Input.mouse.x >= HTP_PREV_X && Input.mouse.x <= HTP_PREV_X + HTP_NAV_W &&
               Input.mouse.y >= HTP_NAV_Y && Input.mouse.y <= HTP_NAV_Y + HTP_NAV_H;
  _globalRRect(HTP_PREV_X, HTP_NAV_Y, HTP_NAV_W, HTP_NAV_H, 6);
  ctx.fillStyle = !canPrev ? 'rgba(40,40,40,0.5)' : hovP ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.58)';
  ctx.fill();
  ctx.strokeStyle = canPrev ? '#b8860b' : 'rgba(100,100,100,0.4)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = !canPrev ? '#555' : hovP ? '#000' : '#fff';
  ctx.font = 'bold 15px sans-serif';
  ctx.fillText('◀ 前へ', HTP_PREV_X + HTP_NAV_W / 2, HTP_NAV_Y + HTP_NAV_H / 2);

  // ページ番号
  ctx.fillStyle = '#aaa'; ctx.font = '14px sans-serif';
  ctx.fillText(`${_htpPage + 1} / ${HTP_PAGES}`, BASE_W / 2, HTP_NAV_Y + HTP_NAV_H / 2);

  // ▶ 次ページボタン
  const canNext = _htpPage < HTP_PAGES - 1;
  const hovN = canNext && Input.mouse.x >= HTP_NEXT_X && Input.mouse.x <= HTP_NEXT_X + HTP_NAV_W &&
               Input.mouse.y >= HTP_NAV_Y && Input.mouse.y <= HTP_NAV_Y + HTP_NAV_H;
  _globalRRect(HTP_NEXT_X, HTP_NAV_Y, HTP_NAV_W, HTP_NAV_H, 6);
  ctx.fillStyle = !canNext ? 'rgba(40,40,40,0.5)' : hovN ? 'rgba(255,255,255,0.92)' : 'rgba(0,0,0,0.58)';
  ctx.fill();
  ctx.strokeStyle = canNext ? '#b8860b' : 'rgba(100,100,100,0.4)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = !canNext ? '#555' : hovN ? '#000' : '#fff';
  ctx.font = 'bold 15px sans-serif';
  ctx.fillText('次へ ▶', HTP_NEXT_X + HTP_NAV_W / 2, HTP_NAV_Y + HTP_NAV_H / 2);

  ctx.restore();
}

// ================================================================
// DEBUG オーバーレイ
// ================================================================
let _fps = 0, _fpsAccum = 0, _fpsCnt = 0;

function renderDebugOverlay(dt) {
  if (!Debug.overlay) return;

  // 基本情報
  ctx.fillStyle = 'rgba(0,0,0,0.70)'; ctx.fillRect(8, 8, 264, 122);
  ctx.fillStyle = '#00ff88'; ctx.font = '14px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(`FPS   : ${_fps.toFixed(1)}`,              16,  16);
  ctx.fillText(`Scene : ${SceneManager.getName()}`,        16,  34);
  ctx.fillText(`dt    : ${(dt * 1000).toFixed(2)} ms`,    16,  52);
  ctx.fillText(`Slow  : ${Debug.slow    ? 'ON ×0.3' : 'off'}`, 16,  70);
  ctx.fillText(`Hitbox: ${Debug.hitbox  ? 'ON' : 'off'}`, 16,  88);
  ctx.fillText(`Labels: ${Debug.labels  ? 'ON' : 'off'}`, 16, 106);

  // Gameシーン専用デバッグ
  if (_sceneName === 'Game') GameScene.debugRender();
}

function renderBuildLabel() {
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px monospace';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(BUILD_LABEL, BASE_W - 8, BASE_H - 6);
}

function renderCursorLabel() {
  if (!Debug.labels) return;
  ctx.fillStyle = 'rgba(255,255,0,0.9)'; ctx.font = '11px monospace';
  ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
  ctx.fillText(`(${Math.floor(Input.mouse.x)}, ${Math.floor(Input.mouse.y)})`, 8, BASE_H - 8);
}

// ================================================================
// MAIN LOOP
// 更新順序: InputEdge → GameState → AI → Render → InputEdge-End
// ================================================================
SceneManager.register('Title',  TitleScene);
SceneManager.register('Game',   GameScene);
SceneManager.register('Result', ResultScene);

// Loading 表示（プリロード中）
ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, BASE_W, BASE_H);
ctx.fillStyle = '#ffffff'; ctx.font = 'bold 36px monospace';
ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
ctx.fillText('Loading...', BASE_W / 2, BASE_H / 2);

let _lastTime = performance.now();

function frame(now) {
  try {
    // ── 1. dt ────────────────────────────────────────────────────
    let dt = (now - _lastTime) / 1000;
    _lastTime = now;
    dt = Math.min(0.033, Math.max(0.001, dt));
    if (Debug.slow) dt *= 0.3;

    // ── 2. FPS ───────────────────────────────────────────────────
    _fpsAccum += dt; _fpsCnt++;
    if (_fpsAccum >= 1.0) { _fps = _fpsCnt / _fpsAccum; _fpsAccum = 0; _fpsCnt = 0; }

    // ── 3. InputEdge: デバッグキー ───────────────────────────────
    if (Input.isPressed('F2')) Debug.overlay    = !Debug.overlay;
    if (Input.isPressed('F3')) Debug.hitbox     = !Debug.hitbox;
    if (Input.isPressed('F4')) { Debug.seedLock   = !Debug.seedLock;   console.log('[DBG] SeedLock:',   Debug.seedLock); }
    if (Input.isPressed('F5')) Debug.slow       = !Debug.slow;
    if (Input.isPressed('F6')) { Debug.screenshot = !Debug.screenshot; console.log('[DBG] Screenshot:', Debug.screenshot); }
    if (Input.isPressed('F7')) Debug.labels     = !Debug.labels;
    if (Input.isPressed('F8')) { Debug.aiDebug   = !Debug.aiDebug;    console.log('[DBG] AIDebug:',    Debug.aiDebug); }
    if (Input.isPressed('F9')) GameScene.dbgDealJoker();  // [DBG] プレイヤーにジョーカー配布

    // ── BUILD 0018: 遊び方モーダル入力処理（全シーン共通）──────────
    // Esc でモーダルを閉じる
    if (Input.isPressed('Escape') && isHowToPlayOpen) {
      isHowToPlayOpen = false;
    }
    // 「？遊び方」ボタン / モーダル内ボタンのクリック判定
    if (Input.mouse.clicked) {
      const mx = Input.mouse.x, my = Input.mouse.y;
      if (!isHowToPlayOpen &&
          mx >= HTB_X && mx <= HTB_X + HTB_W &&
          my >= HTB_Y && my <= HTB_Y + HTB_H) {
        isHowToPlayOpen = true;
        _htpPage = 0;
      } else if (isHowToPlayOpen) {
        // ✕ 閉じる
        if (mx >= HTP_CLOSE_X && mx <= HTP_CLOSE_X + HTP_CLOSE_W &&
            my >= HTP_CLOSE_Y  && my <= HTP_CLOSE_Y  + HTP_CLOSE_H) {
          isHowToPlayOpen = false;
        }
        // ◀ 前ページ
        else if (_htpPage > 0 &&
            mx >= HTP_PREV_X && mx <= HTP_PREV_X + HTP_NAV_W &&
            my >= HTP_NAV_Y  && my <= HTP_NAV_Y  + HTP_NAV_H) {
          _htpPage--;
        }
        // ▶ 次ページ
        else if (_htpPage < HTP_PAGES - 1 &&
            mx >= HTP_NEXT_X && mx <= HTP_NEXT_X + HTP_NAV_W &&
            my >= HTP_NAV_Y  && my <= HTP_NAV_Y  + HTP_NAV_H) {
          _htpPage++;
        }
      }
    }
    // 矢印キーでページ切り替え（モーダル中のみ）
    if (isHowToPlayOpen) {
      if (Input.isPressed('ArrowLeft')  && _htpPage > 0)              _htpPage--;
      if (Input.isPressed('ArrowRight') && _htpPage < HTP_PAGES - 1) _htpPage++;
    }

    // ── 4. GameState / AI 更新 ───────────────────────────────────
    SceneManager.update(dt);

    // ── 5. レンダリング ──────────────────────────────────────────
    // 描画順: シーン → 遊び方モーダル → デバッグ → ビルドラベル → 遊び方ボタン
    SceneManager.render();
    drawHowToPlayModal();
    renderDebugOverlay(dt);
    renderBuildLabel();
    renderCursorLabel();
    drawHowToPlayButton();

    // ── 6. InputEdge 終了 ────────────────────────────────────────
    Input.endFrame();

  } catch (err) {
    ctx.fillStyle = '#000000'; ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.fillStyle = '#ff4444'; ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText('RUNTIME ERROR', 12, 12);
    ctx.fillStyle = '#ff8888'; ctx.font = '13px monospace';
    ctx.fillText(String(err.message), 12, 38);
    const stk = (err.stack || '').split('\n');
    for (let i = 0; i < Math.min(stk.length, 16); i++) ctx.fillText(stk[i], 12, 60 + i * 16);
    console.error('[GAME ERROR]', err);
    try { Input.endFrame(); } catch (_e) {}
  }
  requestAnimationFrame(frame);
}

// 画像プリロード完了後にゲームを開始
preloadNpcImages(() => {
  _lastTime = performance.now();
  SceneManager.change('Title');
  requestAnimationFrame(frame);
});
